# ──────────────────────────────────────────────────────────────
# Biweekly Architecture & Tech Debt Audit (통합 워크플로)
# ──────────────────────────────────────────────────────────────
#
# 격주로 /improve-codebase-architecture + /tech-debt-audit를
# 단일 claude -p 세션에서 실행합니다.
# 직전 감사 이후 코드 변경이 없으면(문서 등 제외) 실행하지 않습니다.
#
# 모델: Opus 4.8 (1M 컨텍스트, 기본 제공)
# Effort: xhigh
#
# 필요 사항:
#   1. `claude setup-token`으로 구독 OAuth 토큰을 생성한 뒤
#      Settings > Secrets에 CLAUDE_CODE_OAUTH_TOKEN 등록
#   2. Settings > Actions > Workflow permissions를
#      "Read and write permissions"로 설정
#   3. 두 스킬은 이 repo의 .claude/skills에서 CI가 설치합니다
#
# 주의:
#   ANTHROPIC_API_KEY / ANTHROPIC_AUTH_TOKEN이 있으면 Claude Code는
#   구독 OAuth보다 API 인증을 우선합니다. 이 workflow는 구독 할당을
#   쓰기 위해 Claude 실행 직전에 해당 변수를 제거합니다.
#
# Codex 전환 시:
#   claude 명령을 codex -q로 교체하고,
#   CLAUDE_CODE_OAUTH_TOKEN을 OPENAI_API_KEY로 변경하십시오.
# ──────────────────────────────────────────────────────────────

name: Biweekly Audit

on:
  schedule:
    - cron: '0 9 1,15 * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: '변경 없어도 강제 실행'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

jobs:
  # ── 1단계: 코드 변경 감지 ──────────────────────────────────
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      should_audit: ${{ steps.detect.outputs.should_audit }}
      last_audit_ref: ${{ steps.detect.outputs.last_audit_ref }}
      changed_files_count: ${{ steps.detect.outputs.changed_files_count }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Detect code changes since last audit
        id: detect
        run: |
          if [ "${{ inputs.force_run }}" = "true" ]; then
            echo "Force run requested."
            echo "should_audit=true" >> "$GITHUB_OUTPUT"
            echo "last_audit_ref=HEAD~50" >> "$GITHUB_OUTPUT"
            echo "changed_files_count=forced" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LAST_AUDIT=$(git tag -l 'audit/*' --sort=-creatordate | head -1)

          if [ -z "$LAST_AUDIT" ]; then
            echo "첫 감사입니다."
            echo "should_audit=true" >> "$GITHUB_OUTPUT"
            echo "last_audit_ref=" >> "$GITHUB_OUTPUT"
            echo "changed_files_count=initial" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Last audit: $LAST_AUDIT"
          echo "last_audit_ref=$LAST_AUDIT" >> "$GITHUB_OUTPUT"

          # 문서·설정·노트북 파일을 제외한 코드 변경 감지
          CODE_CHANGES=$(git diff --name-only "$LAST_AUDIT"..HEAD \
            -- '.' \
            ':!*.md' \
            ':!*.txt' \
            ':!*.rst' \
            ':!*.adoc' \
            ':!*.ipynb' \
            ':!docs/**' \
            ':!doc/**' \
            ':!wiki/**' \
            ':!Wiki/**' \
            ':!LICENSE*' \
            ':!CHANGELOG*' \
            ':!CHANGES*' \
            ':!SECURITY.md' \
            ':!AGENTS.md' \
            ':!CLAUDE.md' \
            ':!CONTEXT.md' \
            ':!*.mermaid' \
            ':!.gitignore' \
            ':!.gitattributes' \
            | wc -l | tr -d ' ')

          echo "Code files changed: $CODE_CHANGES"
          echo "changed_files_count=$CODE_CHANGES" >> "$GITHUB_OUTPUT"

          if [ "$CODE_CHANGES" -eq 0 ]; then
            echo "코드 변경 없음. 종료합니다."
            echo "should_audit=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_audit=true" >> "$GITHUB_OUTPUT"
          fi

  # ── 2단계: 통합 감사 실행 ──────────────────────────────────
  audit:
    needs: check-changes
    if: needs.check-changes.outputs.should_audit == 'true'
    runs-on: ubuntu-latest
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install audit skills
        run: |
          install -d "$HOME/.claude/skills"
          cp -R .claude/skills/improve-codebase-architecture "$HOME/.claude/skills/"
          cp -R .claude/skills/tech-debt-audit "$HOME/.claude/skills/"

          test -f "$HOME/.claude/skills/improve-codebase-architecture/SKILL.md"
          test -f "$HOME/.claude/skills/tech-debt-audit/SKILL.md"

          echo "Installed Claude audit skills:"
          find "$HOME/.claude/skills" -maxdepth 2 -name SKILL.md -print

      - name: Verify Claude subscription credentials
        run: |
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is not configured."
            echo "Generate a subscription OAuth token with 'claude setup-token'."
            echo "Add it under Settings > Secrets and variables > Actions."
            exit 1
          fi

          if [ -n "${ANTHROPIC_API_KEY:-}" ] || [ -n "${ANTHROPIC_AUTH_TOKEN:-}" ]; then
            echo "::warning::Ignoring ANTHROPIC_* credentials so Claude Code uses CLAUDE_CODE_OAUTH_TOKEN."
          fi

      - name: Generate change summary
        id: changes
        run: |
          LAST_REF="${{ needs.check-changes.outputs.last_audit_ref }}"
          if [ -n "$LAST_REF" ]; then
            echo "## 변경된 파일 목록" > change-summary.txt
            echo "" >> change-summary.txt
            git diff --stat "$LAST_REF"..HEAD \
              -- '.' ':!*.md' ':!*.txt' ':!*.rst' ':!*.ipynb' ':!docs/**' \
              >> change-summary.txt 2>/dev/null || true
          else
            echo "첫 감사 실행입니다." > change-summary.txt
          fi

      - name: Run combined audit
        run: |
          unset ANTHROPIC_API_KEY ANTHROPIC_AUTH_TOKEN

          set +e
          claude \
            --model claude-opus-4-8 \
            --effort xhigh \
            --permission-mode auto \
            --max-turns 50 \
            -p "
          You will perform two analyses in sequence within this
          single session. Output everything to stdout.

          GLOBAL RULES:
          - Completely ignore all .ipynb (Jupyter notebook) files.
            They are retained legacy artifacts, not active code.
          - Cite file paths for every finding.
          - Do not suggest full rewrites.
          - Do not pad categories with filler findings.

          ── PART 1: Architecture Analysis ──
          Run /improve-codebase-architecture.
          Identify specific consolidation and deepening opportunities.
          Because this is CI, write the complete architecture analysis to
          ARCHITECTURE_AUDIT.md in the repository root. Do not leave the
          detailed report only in a temp file or browser-opened HTML file.
          When done, print a Markdown horizontal rule (---) as a
          separator, then proceed immediately to Part 2.

          ── PART 2: Tech Debt Audit ──
          Run /tech-debt-audit.
          Produce the full TECH_DEBT_AUDIT.md content with severity,
          effort estimates, and the required 'looks bad but is
          actually fine' section.
          " > combined-audit-report.md 2>&1
          CLAUDE_EXIT=$?
          set -e

          if [ "$CLAUDE_EXIT" -eq 0 ] && [ ! -s ARCHITECTURE_AUDIT.md ]; then
            echo "::error::Claude audit completed without ARCHITECTURE_AUDIT.md."
            cat combined-audit-report.md
            exit 1
          fi

          if [ "$CLAUDE_EXIT" -eq 0 ] && [ ! -s TECH_DEBT_AUDIT.md ]; then
            echo "::error::Claude audit completed without TECH_DEBT_AUDIT.md."
            cat combined-audit-report.md
            exit 1
          fi

          if [ -f ARCHITECTURE_AUDIT.md ]; then
            {
              echo ""
              echo "---"
              echo ""
              echo "# ARCHITECTURE_AUDIT.md"
              echo ""
              cat ARCHITECTURE_AUDIT.md
            } >> combined-audit-report.md
          fi

          if [ -f TECH_DEBT_AUDIT.md ]; then
            {
              echo ""
              echo "---"
              echo ""
              echo "# TECH_DEBT_AUDIT.md"
              echo ""
              cat TECH_DEBT_AUDIT.md
            } >> combined-audit-report.md
          fi

          if [ ! -s combined-audit-report.md ]; then
            echo "Audit produced no output." > combined-audit-report.md
            cat combined-audit-report.md
            exit 1
          fi

          if [ "$CLAUDE_EXIT" -ne 0 ]; then
            echo "Claude audit failed with exit code $CLAUDE_EXIT."
            cat combined-audit-report.md
            exit "$CLAUDE_EXIT"
          fi

      - name: Create GitHub Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          COUNT="${{ needs.check-changes.outputs.changed_files_count }}"

          {
            echo "# Biweekly Audit: ${DATE}"
            echo ""
            echo "변경된 코드 파일: **${COUNT}개**"
            echo "모델: Opus 4.8 · Effort: xhigh · 1M context"
            echo ""
            echo "이 이슈 본문은 artifact의 \`issue-body.md\`에 해당합니다."
            echo "나머지 감사 산출물은 아래 댓글에 파일별로 전체 게시됩니다."
            echo ""
            echo "이 이슈에서 읽을 수 있는 파일:"
            echo "- \`issue-body.md\` - 이 본문"
            echo "- \`change-summary.txt\` - 댓글"
            echo "- \`ARCHITECTURE_AUDIT.md\` - 댓글"
            echo "- \`combined-audit-report.md\` - 댓글"
            echo "- \`TECH_DEBT_AUDIT.md\` - 댓글"
          } > issue-body.md

          post_file_comments() {
            local issue_number="$1"
            local file_path="$2"
            local title="$3"

            if [ ! -s "$file_path" ]; then
              echo "Skipping empty or missing file: $file_path"
              return 0
            fi

            local comment_dir
            comment_dir=$(mktemp -d)
            awk -v prefix="$comment_dir/part-" -v limit=18000 '
              BEGIN {
                part = 0
                size = 0
                file = sprintf("%s%04d", prefix, part)
              }
              {
                line = $0 ORS
                line_size = length(line)
                if (size > 0 && size + line_size > limit) {
                  close(file)
                  part++
                  file = sprintf("%s%04d", prefix, part)
                  size = 0
                }
                printf "%s", line >> file
                size += line_size
              }
            ' "$file_path"

            local total
            total=$(find "$comment_dir" -type f -name 'part-*' | wc -l | tr -d ' ')
            local index=1

            for part in "$comment_dir"/part-*; do
              {
                echo "## ${title} (${index}/${total})"
                echo ""
                echo "Source file: \`${file_path}\`"
                echo ""
                echo '````markdown'
                cat "$part"
                echo ""
                echo '````'
              } > "$comment_dir/comment.md"

              gh issue comment "$issue_number" \
                --repo "${GITHUB_REPOSITORY}" \
                --body-file "$comment_dir/comment.md"

              index=$((index + 1))
            done
          }

          gh label create audit \
            --repo "${GITHUB_REPOSITORY}" \
            --color "5319e7" \
            --description "Architecture and tech debt audit" \
            >/dev/null 2>&1 || true

          gh label create maintenance \
            --repo "${GITHUB_REPOSITORY}" \
            --color "fbca04" \
            --description "Maintenance work" \
            >/dev/null 2>&1 || true

          ISSUE_URL=$(gh issue create \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Biweekly Audit: ${DATE}" \
            --body-file issue-body.md \
            --label audit \
            --label maintenance)

          echo "Created issue: ${ISSUE_URL}"
          ISSUE_NUMBER="${ISSUE_URL##*/}"

          post_file_comments "$ISSUE_NUMBER" change-summary.txt "Change summary"
          post_file_comments "$ISSUE_NUMBER" ARCHITECTURE_AUDIT.md "Architecture audit"
          post_file_comments "$ISSUE_NUMBER" combined-audit-report.md "Combined audit report"
          post_file_comments "$ISSUE_NUMBER" TECH_DEBT_AUDIT.md "Tech debt audit"

      - name: Upload report artifact
        uses: actions/upload-artifact@v7
        with:
          name: "audit-report-${{ github.run_id }}"
          path: |
            combined-audit-report.md
            change-summary.txt
            ARCHITECTURE_AUDIT.md
            TECH_DEBT_AUDIT.md
            issue-body.md
          retention-days: 90

      - name: Tag audit checkpoint
        run: |
          AUDIT_TAG="audit/$(date +%Y%m%d-%H%M%S)"
          git tag "$AUDIT_TAG"
          git push origin "$AUDIT_TAG"
          echo "Tagged: $AUDIT_TAG"
